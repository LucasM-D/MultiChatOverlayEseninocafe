<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        body {
            margin: 0;
            background: #181818;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #resizer {
            position: absolute;
            top: 0;
            left: 40vw;
            width: 6px;
            height: 100vh;
            background: #2e2e2e;
            cursor: ew-resize;
            z-index: 10;
            transition: background 0.2s;
        }

        #resizer:hover, #resizer.active {
            background: #7c5cfc;
        }

        #settings-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
            border: none;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(1.5);
            transform-origin: top left;
            width: 26.666vw;
            min-width: 26.666vw;
        }

        #settings-header {
            padding: 16px;
            border-bottom: 1px solid #2e2e2e;
            flex-shrink: 0;
        }

        #copy-btn {
            width: 100%;
            padding: 10px;
            background: #7c5cfc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        #copy-btn:hover { background: #9170ff; }
        #copy-btn.copied { background: #3ecf8e; }

        #settings-scroll {
            overflow-y: auto;
            flex: 1;
            padding: 8px 0 20px;
        }

        .group-label {
            font-family: sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #9b7dff;
            padding: 16px 16px 6px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            gap: 12px;
            font-family: sans-serif;
        }
        .setting-row:hover { background: #ffffff08; }

        .setting-label { font-size: 13px; color: #e0e0e0; }
        .setting-desc { font-size: 11px; color: #666; margin-top: 2px; }

        input[type="text"], input[type="number"], select {
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 12px;
            padding: 5px 8px;
            outline: none;
        }
        input[type="text"] { width: 130px; }
        input[type="number"] { width: 65px; }
        select { width: 150px; cursor: pointer; }
        input[type="color"] {
            width: 36px; height: 28px;
            border: 1px solid #333;
            border-radius: 5px;
            background: none;
            cursor: pointer;
            padding: 2px;
        }

        .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0;
            background: #333; border-radius: 999px; cursor: pointer;
            transition: background 0.2s;
        }
        .toggle input:checked + .toggle-track { background: #7c5cfc; }
        .toggle-thumb {
            position: absolute; top: 3px; left: 3px;
            width: 14px; height: 14px;
            background: #fff; border-radius: 50%;
            transition: transform 0.2s; pointer-events: none;
        }
        .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

        #widget-container {
            position: absolute;
            left: 40vw;
            width: 60vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe#widget {
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div id="settings-container">
        <div id="settings-header">
            <button id="copy-btn" onclick="copyUrl()">Copy Widget URL</button>
        </div>
        <div id="settings-scroll"></div>
    </div>

    <div id="resizer"></div>

    <div id="widget-container">
        <iframe id="widget"></iframe>
    </div>

    <script src="script.js"></script>

    <script>
        const resizer = document.getElementById('resizer');
        const settingsContainer = document.getElementById('settings-container');
        const widgetContainer = document.getElementById('widget-container');
        const iframe = document.getElementById('widget');

        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'ew-resize';
            resizer.classList.add('active');
            iframe.style.pointerEvents = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            
            let newVisualWidthVw = (e.clientX / window.innerWidth) * 100;
            
            // Constrain between 15vw and 85vw
            if (newVisualWidthVw < 15) newVisualWidthVw = 15;
            if (newVisualWidthVw > 85) newVisualWidthVw = 85;
            
            resizer.style.left = newVisualWidthVw + 'vw';
            
            // The visual width is scaled by 1.5, so the layout width is divided by 1.5
            settingsContainer.style.width = (newVisualWidthVw / 1.5) + 'vw';
            settingsContainer.style.minWidth = (newVisualWidthVw / 1.5) + 'vw';
            
            widgetContainer.style.left = newVisualWidthVw + 'vw';
            widgetContainer.style.width = (100 - newVisualWidthVw) + 'vw';
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                resizer.classList.remove('active');
                iframe.style.pointerEvents = 'auto';
            }
        });
    </script>

</body>

</html>
